<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bush Photography</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    header {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #333;
    }

    header h1 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: 2px;
    }

    nav {
      margin-top: 10px;
    }

    nav a {
      color: #ccc;
      margin: 0 10px;
      text-decoration: none;
      font-size: 0.9rem;
    }

    nav a:hover {
      color: #fff;
    }

    .hero {
      height: 70vh;
      background: url('https://via.placeholder.com/1200x800') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero h2 {
      background: rgba(0,0,0,0.5);
      padding: 20px;
      font-size: 2rem;
    }

    .section {
      padding: 40px 20px;
      max-width: 1000px;
      margin: auto;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 10px;
    }

    .gallery img {
      width: 100%;
      height: auto;
      display: block;
    }

    .about, .contact {
      text-align: center;
      max-width: 600px;
      margin: auto;
      line-height: 1.6;
    }

    footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid #333;
      font-size: 0.8rem;
      color: #888;
    }
  </style>
</head>
<body>

<header>
  <h1>Ava Bush</h1>
  <nav>
    <a href="#portfolio">Portfolio</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Photography Portfolio</h2>
</section>

<section id="portfolio" class="section">
  <h2>Portfolio</h2>
  <div class="gallery">
    <img src="GOPR0332.JPG">
    <img src="GOPR0212.JPG">
    <img src="GOPR0160.JPG">
    <img src="GOPR0958.JPG">
    <img src="GOPR0057.JPG">
    <img src="GOPR0064.JPG">
  </div>
</section>

<section id="about" class="section about">
  <h2>About</h2>
  <p>
    My photography focuses on capturing movements, environments, and stories through visual composition. I explore light, texture, and community experience.
  </p>
</section>

<section id="contact" class="section contact">
  <h2>Contact</h2>
  <p>Email: your@email.com</p>
</section>

<footer>
  <p>© 2026 Bush. All rights reserved.</p>
</footer>

</body>
</html>
